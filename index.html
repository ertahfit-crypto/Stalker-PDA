<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalker PDA Online</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Auth Page -->
        <div id="authPage" class="page active">
            <div class="auth-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">S.T.A.L.K.E.R. PDA</h1>
                        <div class="pda-status">ONLINE</div>
                    </div>
                    
                    <div class="auth-form">
                        <h2 id="authTitle">РЕГИСТРАЦИЯ В ЗОНЕ</h2>
                        
                        <div class="input-group">
                            <label for="callsign">ПОЗЫВНОЙ:</label>
                            <input type="text" id="callsign" placeholder="Введите позывной" class="terminal-input">
                        </div>
                        
                        <div class="input-group">
                            <label for="password">ПАРОЛЬ:</label>
                            <input type="password" id="password" placeholder="Введите пароль" class="terminal-input">
                        </div>
                        
                        <div class="input-group" id="secretSection">
                            <label for="secretQuestion">СЕКРЕТНЫЙ ВОПРОС:</label>
                            <input type="text" id="secretQuestion" placeholder="Ваш любимый артефакт" class="terminal-input">
                            
                            <label for="secretAnswer">ОТВЕТ:</label>
                            <input type="text" id="secretAnswer" placeholder="Ответ на вопрос" class="terminal-input">
                        </div>
                        
                        <button id="authButton" class="pda-button">ЗАРЕГИСТРИРОВАТЬСЯ</button>
                        
                        <div class="auth-switch">
                            <span id="authSwitchText">Есть аккаунт? <a href="#" id="authSwitch">Войти</a></span>
                        </div>
                        
                        <div id="authError" class="error-message"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenuPage" class="page">
            <div class="menu-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">PDA MAIN MENU</h1>
                        <div class="pda-user-info">
                            <span id="userCallsign">СТАЛКЕР</span>
                            <button id="profileBtn" class="profile-button">👤</button>
                        </div>
                    </div>
                    
                    <div class="menu-buttons">
                        <button class="menu-button" data-page="chat">
                            <span class="button-icon">💬</span>
                            <span class="button-text">ЧАТ</span>
                        </button>
                        
                        <button class="menu-button" data-page="map">
                            <span class="button-icon">🗺️</span>
                            <span class="button-text">КАРТА</span>
                        </button>
                        
                        <button class="menu-button" data-page="market">
                            <span class="button-icon">🎒</span>
                            <span class="button-text">ТОРГОВЛЯ</span>
                        </button>
                        
                        <button class="menu-button" data-page="profile">
                            <span class="button-icon">👤</span>
                            <span class="button-text">ПРОФИЛЬ</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Page -->
        <div id="chatPage" class="page">
            <div class="chat-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">PDA CHAT SYSTEM</h1>
                        <button id="backToMenu" class="back-button">← МЕНЮ</button>
                    </div>
                    
                    <div class="chat-messages" id="chatMessages">
                        <!-- Messages will be added here -->
                    </div>
                    
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." class="terminal-input">
                        <button id="sendMessage" class="pda-button">ОТПРАВИТЬ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map Page -->
        <div id="mapPage" class="page">
            <div class="map-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">ZONE MAP</h1>
                        <button id="backToMenuFromMap" class="back-button">← МЕНЮ</button>
                    </div>
                    
                    <div class="map-wrapper">
                        <div class="zone-map" id="zoneMap">
                            <!-- Location points will be added here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Market Page -->
        <div id="marketPage" class="page">
            <div class="market-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">ZONE MARKET</h1>
                        <button id="backToMenuFromMarket" class="back-button">← МЕНЮ</button>
                    </div>
                    
                    <div class="market-controls">
                        <button id="addItemBtn" class="pda-button">ДОБАВИТЬ АРТЕФАКТ</button>
                    </div>
                    
                    <div class="market-items" id="marketItems">
                        <!-- Market items will be added here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Page -->
        <div id="profilePage" class="page">
            <div class="profile-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">STALKER PROFILE</h1>
                        <button id="backToMenuFromProfile" class="back-button">← МЕНЮ</button>
                    </div>
                    
                    <div class="profile-info">
                        <div class="profile-field">
                            <label>ПОЗЫВНОЙ:</label>
                            <span id="profileCallsign">-</span>
                        </div>
                        <div class="profile-field">
                            <label>ДАТА РЕГИСТРАЦИИ:</label>
                            <span id="profileDate">-</span>
                        </div>
                        <div class="profile-field">
                            <label>СТАТУС:</label>
                            <span id="profileStatus">АКТИВЕН</span>
                        </div>
                    </div>
                    
                    <div class="profile-actions">
                        <button id="logoutBtn" class="pda-button danger">ВЫЙТИ</button>
                        <button id="adminPanelBtn" class="pda-button admin" style="display: none;">ПАНЕЛЬ АДМИНА</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="adminPage" class="page">
            <div class="admin-container">
                <div class="pda-frame">
                    <div class="pda-header">
                        <h1 class="pda-title">ADMIN PANEL</h1>
                        <button id="backToProfile" class="back-button">← ПРОФИЛЬ</button>
                    </div>
                    
                    <div class="admin-login" id="adminLogin">
                        <h2>АДМИН АВТОРИЗАЦИЯ</h2>
                        <div class="input-group">
                            <label for="adminLogin">LOGIN:</label>
                            <input type="text" id="adminLoginInput" placeholder="admin" class="terminal-input">
                        </div>
                        <div class="input-group">
                            <label for="adminPassword">PASSWORD:</label>
                            <input type="password" id="adminPasswordInput" placeholder="•••••" class="terminal-input">
                        </div>
                        <button id="adminAuthBtn" class="pda-button">ВОЙТИ</button>
                    </div>
                    
                    <div class="admin-panel" id="adminPanel" style="display: none;">
                        <div class="admin-section">
                            <h3>ПОЛЬЗОВАТЕЛИ</h3>
                            <div id="adminUsers"></div>
                        </div>
                        
                        <div class="admin-section">
                            <h3>СООБЩЕНИЯ</h3>
                            <div id="adminMessages"></div>
                        </div>
                        
                        <div class="admin-section">
                            <h3>ТОВАРЫ</h3>
                            <div id="adminItems"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <div id="locationModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle"></h2>
                <img id="modalImage" src="" alt="">
                <p id="modalDescription"></p>
            </div>
        </div>

        <div id="addItemModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>ДОБАВИТЬ АРТЕФАКТ</h2>
                <div class="input-group">
                    <label for="itemName">НАЗВАНИЕ:</label>
                    <input type="text" id="itemName" class="terminal-input">
                </div>
                <div class="input-group">
                    <label for="itemDescription">ОПИСАНИЕ:</label>
                    <textarea id="itemDescription" class="terminal-input"></textarea>
                </div>
                <div class="input-group">
                    <label for="itemPrice">ЦЕНА:</label>
                    <input type="number" id="itemPrice" class="terminal-input">
                </div>
                <div class="input-group">
                    <label for="itemImage">ИЗОБРАЖЕНИЕ URL:</label>
                    <input type="text" id="itemImage" class="terminal-input" placeholder="https://...">
                </div>
                <button id="submitItem" class="pda-button">ДОБАВИТЬ</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
