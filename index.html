<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stalker PDA Online</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+New:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CRT Эффекты -->
    <div class="crt-effect">
        <div class="scanlines"></div>
        <div class="flicker"></div>
    </div>

    <!-- Фиксированное меню -->
    <nav class="top-menu">
        <div class="menu-title">PDA SYSTEM v2.0</div>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showPage('chat')">ЧАТ</button>
            <button class="menu-btn" onclick="showPage('map')">КАРТА</button>
            <button class="menu-btn" onclick="showPage('market')">ТОРГОВЛЯ</button>
            <button class="menu-btn" onclick="showPage('profile')">ПРОФИЛЬ</button>
        </div>
        <div class="user-info" id="topUserInfo">
            <span id="topUserCallsign">ГОСТЬ</span>
            <button id="authBtn" class="auth-btn">ВОЙТИ</button>
        </div>
    </nav>

    <!-- Основной контейнер -->
    <main class="main-container">
        
        <!-- Страница чата -->
        <section id="chat" class="page active">
            <div class="terminal-frame">
                <div class="terminal-header">
                    <h2>ЧАТ СТАЛКЕРОВ</h2>
                    <div class="status-indicator online">●</div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="system-message">Система: Добро пожаловать в PDA чат...</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" class="terminal-input" placeholder="> Введите сообщение..." disabled>
                    <button id="sendMessage" class="terminal-button" disabled>ОТПРАВИТЬ</button>
                </div>
            </div>
        </section>

        <!-- Страница карты -->
        <section id="map" class="page">
            <div class="terminal-frame">
                <div class="terminal-header">
                    <h2>КАРТА ЗОНЫ</h2>
                    <div class="status-indicator online">●</div>
                </div>
                <div class="zone-map" id="zoneMap">
                    <!-- Локации будут добавлены через JS -->
                </div>
            </div>
        </section>

        <!-- Страница торговли -->
        <section id="market" class="page">
            <div class="terminal-frame">
                <div class="terminal-header">
                    <h2>РЫНОК АРТЕФАКТОВ</h2>
                    <div class="status-indicator online">●</div>
                </div>
                <div class="market-controls">
                    <button id="addItemBtn" class="terminal-button" disabled>ДОБАВИТЬ ПРЕДМЕТ</button>
                </div>
                <div class="market-items" id="marketItems">
                    <div class="system-message">Рынок пуст...</div>
                </div>
            </div>
        </section>

        <!-- Страница профиля -->
        <section id="profile" class="page">
            <div class="terminal-frame">
                <div class="terminal-header">
                    <h2>ПРОФИЛЬ СТАЛКЕРА</h2>
                    <div class="status-indicator online">●</div>
                </div>
                <div class="profile-content">
                    <div class="profile-avatar">
                        <div class="avatar-placeholder" id="avatarPreview">?</div>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                        <button id="uploadAvatarBtn" class="terminal-button" disabled>ЗАГРУЗИТЬ АВАТАР</button>
                    </div>
                    <div class="profile-info">
                        <div class="input-group">
                            <label>ПОЗЫВНОЙ:</label>
                            <input type="text" id="nicknameInput" class="terminal-input" placeholder="Введите позывной" disabled>
                        </div>
                        <div class="profile-stats">
                            <div class="stat-item">
                                <span class="stat-label">СТАТУС:</span>
                                <span class="stat-value" id="userStatus">ГОСТЬ</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">ДАТА ВХОДА:</span>
                                <span class="stat-value" id="loginDate">-</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">УРОВЕНЬ:</span>
                                <select id="rankSelect" class="rank-select" disabled>
                                    <option value="Новичок">НОВИЧОК</option>
                                    <option value="Опытный">ОПЫТНЫЙ</option>
                                    <option value="Ветеран">ВЕТЕРАН</option>
                                    <option value="Мастер">МАСТЕР</option>
                                </select>
                            </div>
                        </div>
                        <div class="profile-actions">
                            <button id="saveProfileBtn" class="terminal-button" disabled>СОХРАНИТЬ</button>
                            <button id="logoutBtn" class="terminal-button danger" style="display: none;">ВЫЙТИ</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Модальные окна -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">ЗАГОЛОВОК</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Контент модалки -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- Кнопки модалки -->
            </div>
        </div>
    </div>

    <!-- Экран авторизации -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-frame">
                <div class="auth-header">
                    <h1 class="auth-title">PDA SYSTEM</h1>
                    <div class="auth-subtitle">ВХОД В ЗОНУ</div>
                </div>
                
                <!-- Экран входа -->
                <div id="loginForm" class="auth-form active">
                    <div class="input-group">
                        <label for="loginEmail">EMAIL</label>
                        <input type="email" id="loginEmail" class="terminal-input" placeholder="Введите email">
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">ПАРОЛЬ</label>
                        <input type="password" id="loginPassword" class="terminal-input" placeholder="Введите пароль">
                    </div>
                    <button id="loginSubmit" class="auth-button">ВОЙТИ</button>
                    <div class="auth-switch">
                        <span>Нет аккаунта? <a href="#" id="switchToRegister" class="auth-link">ЗАРЕГИСТРИРОВАТЬСЯ</a></span>
                    </div>
                </div>
                
                <!-- Экран регистрации -->
                <div id="registerForm" class="auth-form">
                    <div class="input-group">
                        <label for="registerCallsign">ПОЗЫВНОЙ</label>
                        <input type="text" id="registerCallsign" class="terminal-input" placeholder="Ваш позывной в Зоне">
                    </div>
                    <div class="input-group">
                        <label for="registerEmail">EMAIL</label>
                        <input type="email" id="registerEmail" class="terminal-input" placeholder="Введите email">
                    </div>
                    <div class="input-group">
                        <label for="registerPassword">ПАРОЛЬ</label>
                        <input type="password" id="registerPassword" class="terminal-input" placeholder="Минимум 6 символов">
                    </div>
                    <button id="registerSubmit" class="auth-button">СОЗДАТЬ АККАУНТ</button>
                    <div class="auth-switch">
                        <span>Уже есть аккаунт? <a href="#" id="switchToLogin" class="auth-link">ВОЙТИ</a></span>
                    </div>
                </div>
                
                <div class="auth-error" id="authError"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    
    <script src="app-spa.js"></script>
</body>
</html>
